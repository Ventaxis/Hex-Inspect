name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Create Android Project Structure
        run: |
          mkdir -p app/src/main/java/com/hex/inspect
          mkdir -p app/src/main/res
          
          # Переносим твои .kt файлы в правильную структуру Android-модуля
          mv *.kt app/src/main/java/com/hex/inspect/ || true
          
          # Если AndroidManifest.xml лежит в корне, переносим его тоже
          if [ -f AndroidManifest.xml ]; then
            mv AndroidManifest.xml app/src/main/
          fi
          
          # Если build.gradle.kts лежит в корне, переносим его в модуль app
          if [ -f build.gradle.kts ]; then
            mv build.gradle.kts app/
          fi

          # Создаем минимальный settings.gradle.kts
          echo "rootProject.name = \"Hex-Inspect\"" > settings.gradle.kts
          echo "include(\":app\")" >> settings.gradle.kts

          # Генерируем Gradle wrapper, чтобы появился gradlew
          gradle wrapper

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build Debug APK with Gradle
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hex-inspect-debug
          path: app/build/outputs/apk/debug/app-debug.apk
